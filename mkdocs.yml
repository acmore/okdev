site_name: okdev
site_description: Lightweight Kubernetes-native dev environments for AI infra engineering
repo_url: https://github.com/acmore/okdev
repo_name: acmore/okdev
theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - navigation.top
extra_css:
  - stylesheets/extra.css
exclude_docs: |
  okdev-design.md
  okdev-implementation-plan.md
  plans/**
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Config Manifest: config-manifest.md
  - Command Reference: command-reference.md
  - Release: release.md
  - Troubleshooting: troubleshooting.md
  - Repository: https://github.com/acmore/okdev
