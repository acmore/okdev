# okdev default tmux profile for AI infra development.
# Keep tmux defaults where possible (including the default prefix C-b).

# Better long-running workflow ergonomics.
set -g history-limit 200000
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off

# Faster, cleaner terminal behavior.
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g default-terminal "tmux-256color"

# Prefer vi keys in copy mode for logs/code.
setw -g mode-keys vi

# Compact status line with active path and time.
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=cyan,bold]#S  "
set -g status-right "#[fg=colour245]#{pane_current_path} #[fg=cyan]%Y-%m-%d %H:%M"
