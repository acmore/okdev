# okdev default tmux profile for AI infra development.
# Keep tmux defaults where possible (including the default prefix C-b).

# Better long-running workflow ergonomics.
set -g history-limit 200000
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off

# Faster, cleaner terminal behavior.
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g default-terminal "tmux-256color"

# Prefer vi keys in copy mode for logs/code.
setw -g mode-keys vi
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Route new windows and panes through the dev-shell wrapper so tmux always
# lands in the dev container rather than the sidecar.
unbind c
bind c new-window "/usr/local/bin/dev-shell.sh"
unbind '"'
bind '"' split-window -v "/usr/local/bin/dev-shell.sh"
unbind %
bind % split-window -h "/usr/local/bin/dev-shell.sh"

# Compact status line with active path and time.
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=cyan,bold]#S  "
set -g status-right "#[fg=colour245]#{pane_current_path} #[fg=cyan]%Y-%m-%d %H:%M"
