name: Sidecar Image

on:
  workflow_dispatch:
    inputs:
      syncthing_version:
        description: Syncthing version (e.g. v1.29.7)
        required: false
        default: v1.29.7
  workflow_run:
    workflows: ["E2E Kind"]
    types:
      - completed
  push:
    branches: [main]
    paths:
      - ".github/workflows/syncthing-image.yml"
      - "infra/sidecar/**"
      - "cmd/okdev-sshd/**"
      - "internal/syncthing/**"
      - "internal/ssh/**"
      - "internal/cli/syncthing.go"
      - "internal/cli/ssh.go"
      - "internal/cli/up.go"
      - "internal/workload/**"

jobs:
  build-and-push:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set variables
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.syncthing_version }}" ]]; then
            syncthing_version="${{ github.event.inputs.syncthing_version }}"
          else
            syncthing_version="v1.29.7"
          fi
          echo "syncthing_version=${syncthing_version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/okdev
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=edge-
            type=raw,value=${{ github.event.workflow_run.head_branch }},enable=${{ github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'v') }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/sidecar/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SYNCTHING_VERSION=${{ steps.vars.outputs.syncthing_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
