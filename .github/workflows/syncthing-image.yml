name: Syncthing Sidecar Image

on:
  workflow_dispatch:
    inputs:
      syncthing_version:
        description: Syncthing version (e.g. v1.29.7)
        required: false
        default: v1.29.7
  push:
    branches: [main]
    tags:
      - 'syncthing-v*'
    paths:
      - 'infra/syncthing/**'
      - '.github/workflows/syncthing-image.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/syncthing-v* ]]; then
            version="${GITHUB_REF_NAME#syncthing-}"
          elif [[ -n "${{ github.event.inputs.syncthing_version }}" ]]; then
            version="${{ github.event.inputs.syncthing_version }}"
          else
            version="v1.29.7"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/okdev-syncthing
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=edge-
            type=match,pattern=syncthing-(v.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/syncthing-v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infra/syncthing
          file: infra/syncthing/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SYNCTHING_VERSION=${{ steps.vars.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
