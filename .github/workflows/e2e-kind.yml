name: E2E Kind

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: helm/kind-action@v1.12.0
        with:
          cluster_name: okdev-e2e

      - name: Build okdev CLI
        run: go build -o bin/okdev ./cmd/okdev

      - name: Build sidecar image
        run: docker build -f infra/sidecar/Dockerfile -t okdev-sidecar:e2e .

      - name: Load sidecar image into kind
        run: kind load docker-image okdev-sidecar:e2e --name okdev-e2e

      - name: Run smoke test
        run: bash scripts/e2e_kind_smoke.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 200 || true
