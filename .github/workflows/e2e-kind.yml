name: E2E Kind

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  kind:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: helm/kind-action@v1.12.0
        with:
          cluster_name: okdev-e2e

      - name: Build okdev CLI
        run: go build -o bin/okdev ./cmd/okdev

      - name: Build sidecar image
        run: docker build -f infra/sidecar/Dockerfile -t okdev-sidecar:v0.0.0-e2e .

      - name: Load sidecar image into kind
        run: kind load docker-image okdev-sidecar:v0.0.0-e2e --name okdev-e2e

      - name: Run pod smoke test
        run: bash scripts/e2e_kind_smoke.sh

      - name: Run deployment test
        run: bash scripts/e2e_kind_deployment.sh

      - name: Run job test
        run: bash scripts/e2e_kind_job.sh

      - name: Run multi-session test
        run: bash scripts/e2e_kind_multi_session.sh

      - name: Install Kubeflow Training Operator
        run: |
          kubectl apply --server-side -k "https://github.com/kubeflow/training-operator.git/manifests/overlays/standalone?ref=v1.8.1"
          echo "Waiting for training-operator controller to be ready"
          kubectl -n kubeflow wait --for=condition=Available deployment/training-operator --timeout=120s

      - name: Run PyTorchJob test
        run: bash scripts/e2e_kind_pytorchjob.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get deployments -A -o wide || true
          kubectl get jobs -A -o wide || true
          kubectl get pytorchjobs -A -o wide || true
          kubectl get pvc -A -o wide || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 300 || true
          for pod in $(kubectl -n default get pods -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- ${pod} describe ---"
            kubectl -n default describe pod "$pod" || true
            echo "--- ${pod} logs: okdev-sidecar ---"
            kubectl -n default logs "$pod" -c okdev-sidecar || true
            for container in dev pytorch; do
              if kubectl -n default get pod "$pod" -o jsonpath="{.spec.containers[?(@.name==\"${container}\")].name}" 2>/dev/null | grep -q .; then
                echo "--- ${pod} logs: ${container} ---"
                kubectl -n default logs "$pod" -c "$container" || true
              fi
            done
          done
          kubectl -n kubeflow logs deployment/training-operator --tail=100 || true
