name: Release

on:
  workflow_run:
    workflows: ["E2E Kind"]
    types:
      - completed

jobs:
  build:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build archive
        env:
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
        run: |
          mkdir -p dist
          VERSION="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BIN="okdev_${{ matrix.goos }}_${{ matrix.goarch }}"
          OUT_DIR="dist/${BIN}"
          mkdir -p "${OUT_DIR}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
            -trimpath \
            -ldflags="-s -w -X github.com/acmore/okdev/internal/version.Version=${VERSION} -X github.com/acmore/okdev/internal/version.Commit=${COMMIT} -X github.com/acmore/okdev/internal/version.Date=${BUILD_DATE} -X github.com/acmore/okdev/internal/analytics.PostHogKey=${POSTHOG_PROJECT_KEY}" \
            -o "${OUT_DIR}/okdev" \
            ./cmd/okdev
          tar -C "${OUT_DIR}" -czf "dist/${BIN}.tar.gz" okdev
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: okdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/okdev_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      }}
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: okdev-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum okdev_*.tar.gz > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          prerelease: ${{ contains(github.event.workflow_run.head_branch, '-') }}
          files: |
            dist/okdev_*.tar.gz
            dist/checksums.txt
