name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: helm/kind-action@v1.12.0
        with:
          cluster_name: okdev-e2e
      - name: Build okdev CLI
        run: go build -o bin/okdev ./cmd/okdev
      - name: Build sidecar image
        run: docker build -f infra/sidecar/Dockerfile -t okdev-sidecar:v0.0.0-e2e .
      - name: Load sidecar image into kind
        run: kind load docker-image okdev-sidecar:v0.0.0-e2e --name okdev-e2e
      - name: Run smoke test
        run: bash scripts/e2e_kind_smoke.sh
      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 200 || true
          kubectl -n default logs okdev-e2e-smoke -c okdev-sidecar || true
          kubectl -n default logs okdev-e2e-smoke -c dev || true
          kubectl -n default exec okdev-e2e-smoke -c dev -- sh -lc 'ps aux || ps' || true
          kubectl -n default exec okdev-e2e-smoke -c dev -- sh -lc 'ls -R /var/okdev /tmp 2>/dev/null | sed -n "1,200p"' || true

  build:
    runs-on: ubuntu-latest
    needs: smoke
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build archive
        env:
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BIN="okdev_${{ matrix.goos }}_${{ matrix.goarch }}"
          OUT_DIR="dist/${BIN}"
          mkdir -p "${OUT_DIR}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
            -trimpath \
            -ldflags="-s -w -X github.com/acmore/okdev/internal/version.Version=${VERSION} -X github.com/acmore/okdev/internal/version.Commit=${COMMIT} -X github.com/acmore/okdev/internal/version.Date=${BUILD_DATE} -X github.com/acmore/okdev/internal/analytics.PostHogKey=${POSTHOG_PROJECT_KEY}" \
            -o "${OUT_DIR}/okdev" \
            ./cmd/okdev
          tar -C "${OUT_DIR}" -czf "dist/${BIN}.tar.gz" okdev
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: okdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/okdev_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: okdev-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum okdev_*.tar.gz > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/okdev_*.tar.gz
            dist/checksums.txt
