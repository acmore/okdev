name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/okdev-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/okdev
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: okdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/okdev-${{ matrix.goos }}-${{ matrix.goarch }}
