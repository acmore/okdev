name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --disable-all --enable=gofmt --enable=govet --timeout=5m
      - name: Build
        run: go build ./cmd/okdev
